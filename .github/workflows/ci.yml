name: CI

on:
  push:
    branches: [main, feat/routing-mvp]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Build and test
        run: ./gradlew build --no-daemon --stacktrace
