# Example routing-test suite for iflowlab.
# Run from the project root:  ./gradlew run --args="examples/receiver-suite.yaml"
# Exit code 0 = all cases pass; 1 = a case failed; 2 = config error.
xslt: receiver-determination.xslt   # resolved relative to THIS file's directory
mode: receiver
tests:
  - name: routes to BANK_A
    params: { dc_Receiver: BANK_A }
    expect:
      receivers:
        - name: BANK_A

  - name: routes to both (order-insensitive)
    params: { dc_Receiver: BOTH }
    expect:
      receivers:
        - name: BANK_B
        - name: BANK_A

  - name: header-only routing (dummy body injected)
    params: { dc_Receiver: BANK_A }
    expect:
      receivers:
        - name: BANK_A
